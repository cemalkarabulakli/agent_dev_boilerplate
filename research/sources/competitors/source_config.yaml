{
  "id": "competitors",
  "name": "Competitor Websites",
  "enabled": true,
  "mode": "mock",
  "queries": [
    "high ticket expert offer",
    "premium service business [your niche]"
  ],
  "collection": {
    "max_results_per_query": 20,
    "save_raw": true,
    "save_processed": true,
    "include_references": true,
    "include_timestamps": true,
    "save_screenshots": false
  },
  "processing": {
    "extract": [
      "positioning_patterns",
      "pricing_signals",
      "offer_stack_signals",
      "cta_patterns",
      "major_changes",
      "competitor_mentions",
      "ad_angles"
    ]
  },
  "scoring": {
    "min_confidence_for_candidate": 0.5,
    "min_confidence_for_validated": 0.75,
    "require_cross_source_validation": true
  },
  "compliance": {
    "respect_robots_txt": true,
    "use_official_api_when_available": true,
    "store_personal_data": false,
    "notes": "Monitor public competitor pages only. Do not bypass access controls."
  }
}
