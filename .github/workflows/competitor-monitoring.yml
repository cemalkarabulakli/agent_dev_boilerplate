name: Competitor Monitoring

on:
  schedule:
    - cron: "0 7 * * 3"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run competitor monitoring tests
        run: python -m pytest tests/test_competitor_monitoring.py
