name: Competitor Monitoring

on:
  schedule:
    - cron: "31 5 * * 2"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run competitor monitoring (mock-safe)
        env:
          WEB_TOOLS_MODE: ${{ secrets.WEB_TOOLS_MODE || 'mock' }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY || '' }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY || '' }}
          PLAYWRIGHT_ENABLED: "false"
        run: python scripts/monitor_competitor_pages.py --query "AI automation agency Bulgaria"
      - name: Upload competitor monitoring report
        uses: actions/upload-artifact@v4
        with:
          name: competitor-monitoring-report
          path: outputs/competitor_monitoring/
