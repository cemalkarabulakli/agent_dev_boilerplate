{
  "name": "Competitor Monitoring",
  "on": {
    "schedule": [
      {
        "cron": "31 5 * * 2"
      }
    ],
    "workflow_dispatch": {
      "inputs": {
        "query": {
          "description": "Competitor search query. Leave blank to read market_name from business_context.yaml.",
          "required": false,
          "default": ""
        }
      }
    }
  },
  "jobs": {
    "competitor-monitoring": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@v4"
        },
        {
          "uses": "actions/setup-python@v5",
          "with": {
            "python-version": "3.12"
          }
        },
        {
          "name": "Install dependencies",
          "run": "pip install -r requirements.txt"
        },
        {
          "name": "Resolve competitor query",
          "id": "resolve_query",
          "run": "INPUT_QUERY=\"${{ github.event.inputs.query }}\"\nif [ -n \"$INPUT_QUERY\" ]; then\n  echo \"query=$INPUT_QUERY\" >> $GITHUB_OUTPUT\nelse\n  MARKET=$(python -c \"import json,sys; d=json.load(open('business_context.yaml')); print(d.get('market',{}).get('market_name','') or '')\")\n  if [ -n \"$MARKET\" ]; then\n    echo \"query=$MARKET\" >> $GITHUB_OUTPUT\n  else\n    echo \"query=high ticket expert offer\" >> $GITHUB_OUTPUT\n  fi\nfi"
        },
        {
          "name": "Run competitor monitoring",
          "run": "python scripts/monitor_competitors.py --query \"${{ steps.resolve_query.outputs.query }}\""
        },
        {
          "name": "Upload competitor monitoring artifacts",
          "uses": "actions/upload-artifact@v4",
          "with": {
            "name": "competitor-monitoring-artifacts",
            "path": "outputs/competitor_monitoring/\nresearch/sources/competitors/"
          }
        }
      ]
    }
  }
}
