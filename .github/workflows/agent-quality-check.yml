name: Agent Quality Check

on:
  push:
    paths:
      - "agents/**"
  pull_request:
    paths:
      - "agents/**"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Validate agent structure
        run: python scripts/validate_agent_structure.py
