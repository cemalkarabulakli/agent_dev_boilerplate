{
  "name": "CI",
  "on": {
    "push": {},
    "pull_request": {}
  },
  "jobs": {
    "ci": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@v4"
        },
        {
          "uses": "actions/setup-python@v5",
          "with": {
            "python-version": "3.12"
          }
        },
        {
          "name": "Install dependencies",
          "run": "pip install -r requirements.txt"
        },
        {
          "name": "Run tests",
          "run": "python -m pytest"
        },
        {
          "name": "Validate YAML",
          "run": "python scripts/validate_yaml.py"
        },
        {
          "name": "Validate agent structure",
          "run": "python scripts/validate_agent_structure.py"
        }
      ]
    }
  }
}
