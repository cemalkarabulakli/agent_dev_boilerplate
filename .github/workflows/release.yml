name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Validate agent structure
        run: python scripts/validate_agent_structure.py

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            pip install agent-boilerplate==${{ github.ref_name }}
            ```

            Or upgrade an existing installation:

            ```bash
            pip install --upgrade agent-boilerplate
            ```

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
