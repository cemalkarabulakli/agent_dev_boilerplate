{
  "name": "Weekly Research",
  "on": {
    "schedule": [
      {
        "cron": "23 4 * * 1"
      }
    ],
    "workflow_dispatch": {}
  },
  "jobs": {
    "weekly-research": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@v4"
        },
        {
          "uses": "actions/setup-python@v5",
          "with": {
            "python-version": "3.12"
          }
        },
        {
          "name": "Install dependencies",
          "run": "pip install -r requirements.txt"
        },
        {
          "name": "Run weekly research in configured mode",
          "run": "python scripts/run_weekly_research.py"
        },
        {
          "name": "Upload weekly research artifacts",
          "uses": "actions/upload-artifact@v4",
          "with": {
            "name": "weekly-research-artifacts",
            "path": "outputs/weekly_reports/\nresearch/processed/cross_source_reports/\nresearch/insights/\nresearch/index/collected_references.jsonl"
          }
        }
      ]
    }
  }
}
