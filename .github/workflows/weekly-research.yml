name: Weekly Research

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Validate research sources
        run: python -m pytest tests/test_research_sources.py tests/test_weekly_research_sources.py
