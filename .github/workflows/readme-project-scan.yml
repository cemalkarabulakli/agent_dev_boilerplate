name: README Project Scan

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

jobs:
  readme-project-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README project scan
        run: python scripts/update_readme_project_scan.py

      - name: Detect generated changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain README.md .readme_project_manifest.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: automation/readme-project-scan-${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add README.md .readme_project_manifest.json
          git commit -m "Update README project scan"
          git push --set-upstream origin "$BRANCH_NAME"
          gh pr create \
            --title "Update README project scan" \
            --body "Automated README project scan update. This PR was opened instead of pushing directly to main." \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH_NAME"
