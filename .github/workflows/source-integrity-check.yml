name: Source Integrity Check

on:
  push:
    paths:
      - "research/**"
  pull_request:
    paths:
      - "research/**"
  schedule:
    - cron: "0 4 * * *"

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run source integrity tests
        run: python -m pytest tests/test_reference_manager.py tests/test_source_provider_registry.py
