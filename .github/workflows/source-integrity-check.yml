{
  "name": "Source Integrity Check",
  "on": {
    "push": {},
    "pull_request": {}
  },
  "jobs": {
    "source-integrity": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@v4"
        },
        {
          "uses": "actions/setup-python@v5",
          "with": {
            "python-version": "3.12"
          }
        },
        {
          "name": "Install dependencies",
          "run": "pip install -r requirements.txt"
        },
        {
          "name": "Research source checklist",
          "run": "python scripts/run_checklist.py --checklist research_source_checklist"
        },
        {
          "name": "Reference integrity checklist",
          "run": "python scripts/run_checklist.py --checklist reference_integrity_checklist"
        },
        {
          "name": "Cross-source validation checklist",
          "run": "python scripts/run_checklist.py --checklist cross_source_validation_checklist"
        },
        {
          "name": "Web tool provider checklist",
          "run": "python scripts/run_checklist.py --checklist web_tool_provider_checklist"
        },
        {
          "name": "Competitor monitoring checklist",
          "run": "python scripts/run_checklist.py --checklist competitor_monitoring_checklist"
        },
        {
          "name": "Research source tests",
          "run": "python -m pytest tests/test_research_sources.py tests/test_web_tool_interfaces.py tests/test_web_tool_registry.py tests/test_source_provider_registry.py tests/test_competitor_monitoring.py"
        }
      ]
    }
  }
}
