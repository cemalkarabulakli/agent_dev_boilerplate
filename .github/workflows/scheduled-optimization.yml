{
  "name": "Scheduled Optimization",
  "on": {
    "schedule": [
      {
        "cron": "17 3 * * 1"
      }
    ],
    "workflow_dispatch": {}
  },
  "jobs": {
    "optimization": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@v4"
        },
        {
          "uses": "actions/setup-python@v5",
          "with": {
            "python-version": "3.12"
          }
        },
        {
          "name": "Install dependencies",
          "run": "pip install -r requirements.txt"
        },
        {
          "name": "Compact contexts",
          "run": "python scripts/compact_context.py --all"
        },
        {
          "name": "Run checklists",
          "run": "python scripts/run_checklist.py --all"
        },
        {
          "name": "Generate optimization report",
          "run": "mkdir -p outputs/quality_reports\nprintf '# Scheduled Optimization Report\\nNo files are committed or pushed by default.\\n' > outputs/quality_reports/scheduled_optimization_report.md"
        },
        {
          "name": "Upload artifact",
          "uses": "actions/upload-artifact@v4",
          "if": "always()",
          "with": {
            "name": "scheduled-optimization-reports",
            "path": "outputs/quality_reports/"
          }
        }
      ]
    }
  }
}
