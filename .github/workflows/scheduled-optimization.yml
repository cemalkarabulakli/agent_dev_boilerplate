name: Scheduled Optimization

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  scheduled-optimization:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Re-compact stale sessions
        run: python scripts/compact_context.py --all

      - name: Rebuild knowledge indexes
        run: python scripts/update_knowledge_index.py --all

      - name: Run evals
        run: python scripts/run_evals.py --all

      - name: Generate optimization report
        run: |
          mkdir -p reports
          {
            echo "# Scheduled Optimization Report"
            echo
            echo "Generated by GitHub Actions."
            echo
            echo "- Context compaction was run."
            echo "- Knowledge indexes were rebuilt locally."
            echo "- Deterministic evals were run."
            echo "- No changes were committed automatically."
            echo
            echo "AUTO_PR_MODE is scaffolded for future use and is disabled by default."
          } > reports/scheduled_optimization_report.md

      - name: Upload optimization reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scheduled-optimization-reports
          path: reports/
